# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: "Web Quality Gatekeeper"
description: "Run Playwright smoke checks, axe accessibility scans, Lighthouse performance audits, and visual regression diffs"
branding:
  icon: "check-circle"
  color: "blue"

inputs:
  url:
    description: "URL to audit"
    required: true
  config-path:
    description: "Path to config JSON file"
    required: false
    default: "configs/default.json"
  baseline-dir:
    description: "Directory for visual regression baselines"
    required: false
    default: "baselines"
  policy:
    description: "Built-in policy template name or policy config path"
    required: false
    default: ""
  fail-on-a11y:
    description: "Fail if accessibility violations are found"
    required: false
    default: "true"
  fail-on-perf:
    description: "Fail if performance budgets are exceeded"
    required: false
    default: "true"
  fail-on-visual:
    description: "Fail if visual diffs exceed threshold"
    required: false
    default: "true"
  allow-internal-targets:
    description: "Allow internal/private audit targets in CI or authenticated runs"
    required: false
    default: "false"
  headers:
    description: "Optional newline-delimited headers in Name: Value format"
    required: false
    default: ""
  cookies:
    description: "Optional cookies in name=value format (semicolon or newline delimited)"
    required: false
    default: ""

outputs:
  status:
    description: "Overall audit status: pass or fail"
    value: ${{ steps.audit.outputs.status }}
  summary-path:
    description: "Path to the JSON summary file"
    value: ${{ steps.audit.outputs.summary-path }}

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      working-directory: ${{ github.action_path }}
      shell: bash
      run: npm ci --ignore-scripts

    - name: Install Playwright browsers (Linux)
      if: runner.os == 'Linux'
      working-directory: ${{ github.action_path }}
      shell: bash
      run: npx playwright install --with-deps chromium

    - name: Install Playwright browsers (macOS/Windows)
      if: runner.os != 'Linux'
      working-directory: ${{ github.action_path }}
      shell: bash
      run: npx playwright install chromium

    - name: Build
      working-directory: ${{ github.action_path }}
      shell: bash
      run: npm run build

    - name: Run audit
      id: audit
      working-directory: ${{ github.action_path }}
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_CONFIG: ${{ inputs.config-path }}
        INPUT_BASELINE: ${{ inputs.baseline-dir }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_A11Y: ${{ inputs.fail-on-a11y }}
        INPUT_PERF: ${{ inputs.fail-on-perf }}
        INPUT_VISUAL: ${{ inputs.fail-on-visual }}
        INPUT_ALLOW_INTERNAL: ${{ inputs.allow-internal-targets }}
        INPUT_HEADERS: ${{ inputs.headers }}
        INPUT_COOKIES: ${{ inputs.cookies }}
      run: |
        normalize_shell_path() {
          local candidate="$1"
          if [[ "$candidate" =~ ^[A-Za-z]:[\\/].* ]]; then
            if command -v wslpath >/dev/null 2>&1; then
              local converted
              if converted="$(wslpath -a "$candidate" 2>/dev/null)"; then
                printf '%s\n' "$converted"
                return
              fi
            fi
            if command -v cygpath >/dev/null 2>&1; then
              local converted
              if converted="$(cygpath -u "$candidate" 2>/dev/null)"; then
                printf '%s\n' "$converted"
                return
              fi
            fi

            local drive_letter="${candidate%%:*}"
            local remainder="${candidate#?:}"
            remainder="${remainder//\\//}"
            drive_letter="$(printf '%s' "$drive_letter" | tr '[:upper:]' '[:lower:]')"
            printf '/%s%s\n' "$drive_letter" "$remainder"
            return
          fi
          printf '%s\n' "$candidate"
        }

        normalize_node_path() {
          local candidate="$1"
          if [[ "$candidate" =~ ^[A-Za-z]:[\\/].* ]]; then
            printf '%s\n' "${candidate//\\//}"
            return
          fi
          printf '%s\n' "$candidate"
        }

        NODE_PLATFORM="$(node -p "process.platform")"

        is_absolute_path() {
          local candidate="$1"
          [[ "$candidate" = /* || "$candidate" =~ ^[A-Za-z]:[\\/].* || "$candidate" =~ ^\\\\ ]]
        }

        ACTION_ROOT_SHELL="$(normalize_shell_path "$GITHUB_ACTION_PATH")"
        WORKSPACE_ROOT_SHELL="$(normalize_shell_path "$GITHUB_WORKSPACE")"

        normalize_runtime_path() {
          local candidate="$1"
          if [[ "$NODE_PLATFORM" == "win32" ]]; then
            normalize_node_path "$candidate"
          else
            normalize_shell_path "$candidate"
          fi
        }

        ACTION_ROOT_RUNTIME="$(normalize_runtime_path "$GITHUB_ACTION_PATH")"
        WORKSPACE_ROOT_RUNTIME="$(normalize_runtime_path "$GITHUB_WORKSPACE")"
        if [[ "$NODE_PLATFORM" != "win32" ]]; then
          export GITHUB_ACTION_PATH="$ACTION_ROOT_RUNTIME"
          export GITHUB_WORKSPACE="$WORKSPACE_ROOT_RUNTIME"
        fi
        GITHUB_OUTPUT_PATH="${GITHUB_OUTPUT:-}"
        if [[ -n "$GITHUB_OUTPUT_PATH" ]]; then
          GITHUB_OUTPUT_PATH="$(normalize_shell_path "$GITHUB_OUTPUT_PATH")"
        fi

        resolve_workspace_path_shell() {
          local candidate="$1"
          candidate="$(normalize_shell_path "$candidate")"
          if [[ "$candidate" = /* ]]; then
            printf '%s\n' "$candidate"
          else
            printf '%s\n' "${WORKSPACE_ROOT_SHELL}/${candidate}"
          fi
        }

        resolve_workspace_path_node() {
          local candidate="$1"
          if is_absolute_path "$candidate"; then
            printf '%s\n' "$(normalize_runtime_path "$candidate")"
          else
            printf '%s/%s\n' "${WORKSPACE_ROOT_RUNTIME}" "$candidate"
          fi
        }

        resolve_config_path() {
          local candidate="$1"
          local workspace_candidate_shell
          local workspace_candidate_node
          workspace_candidate_shell="$(resolve_workspace_path_shell "$candidate")"
          workspace_candidate_node="$(resolve_workspace_path_node "$candidate")"
          if [[ -f "$workspace_candidate_shell" ]]; then
            printf '%s\n' "$workspace_candidate_node"
            return
          fi
          if [[ "$candidate" == "configs/default.json" && -f "${ACTION_ROOT_SHELL}/configs/default.json" ]]; then
            printf '%s\n' "${ACTION_ROOT_RUNTIME}/configs/default.json"
            return
          fi
          printf '%s\n' "$workspace_candidate_node"
        }

        resolve_policy_reference() {
          local candidate="$1"
          local trimmed
          trimmed="${candidate#"${candidate%%[![:space:]]*}"}"
          trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
          if [[ -z "$trimmed" ]]; then
            printf '%s\n' "$trimmed"
            return
          fi

          local by_prefix="$trimmed"
          local had_policy_prefix="false"
          if [[ "$trimmed" == policy:* ]]; then
            had_policy_prefix="true"
            by_prefix="${trimmed#policy:}"
          fi

          case "$by_prefix" in
            marketing|docs|ecommerce|saas)
              # Preserve built-in policy names so runtime can resolve them internally.
              printf '%s\n' "$trimmed"
              ;;
            *)
              if [[ "$had_policy_prefix" == "true" ]]; then
                printf '%s\n' "$(resolve_workspace_path_node "$by_prefix")"
              else
                printf '%s\n' "$(resolve_workspace_path_node "$trimmed")"
              fi
              ;;
          esac
        }

        CONFIG_PATH="$(resolve_config_path "$INPUT_CONFIG")"
        BASELINE_PATH="$(resolve_workspace_path_node "$INPUT_BASELINE")"
        POLICY_REFERENCE="$(resolve_policy_reference "$INPUT_POLICY")"
        OUT_DIR="${WORKSPACE_ROOT_RUNTIME}/artifacts"

        ARGS=(
          "$INPUT_URL"
          "--config" "$CONFIG_PATH"
          "--baseline-dir" "$BASELINE_PATH"
          "--out" "$OUT_DIR"
        )
        [[ -n "$POLICY_REFERENCE" ]] && ARGS+=("--policy" "$POLICY_REFERENCE")
        [[ "$INPUT_A11Y" != "true" ]] && ARGS+=("--no-fail-on-a11y")
        [[ "$INPUT_PERF" != "true" ]] && ARGS+=("--no-fail-on-perf")
        [[ "$INPUT_VISUAL" != "true" ]] && ARGS+=("--no-fail-on-visual")
        [[ "$INPUT_ALLOW_INTERNAL" == "true" ]] && ARGS+=("--allow-internal-targets")
        if [[ -n "$INPUT_HEADERS" ]]; then
          while IFS= read -r header; do
            [[ -z "${header// }" ]] && continue
            ARGS+=("--header" "$header")
          done <<< "$INPUT_HEADERS"
        fi
        if [[ -n "$INPUT_COOKIES" ]]; then
          COOKIES_NORMALIZED="${INPUT_COOKIES//$'\n'/;}"
          IFS=';' read -ra COOKIE_PARTS <<< "$COOKIES_NORMALIZED"
          for cookie in "${COOKIE_PARTS[@]}"; do
            cookie="${cookie#"${cookie%%[![:space:]]*}"}"
            cookie="${cookie%"${cookie##*[![:space:]]}"}"
            [[ -z "$cookie" ]] && continue
            ARGS+=("--cookie" "$cookie")
          done
        fi

        node "${ACTION_ROOT_RUNTIME}/dist/cli.js" audit "${ARGS[@]}"
        STATUS=$(node -e "const fs=require('node:fs');const s=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));console.log(s.overallStatus)" "${OUT_DIR}/summary.json")
        echo "status=$STATUS" >> "$GITHUB_OUTPUT_PATH"
        echo "summary-path=artifacts/summary.json" >> "$GITHUB_OUTPUT_PATH"
