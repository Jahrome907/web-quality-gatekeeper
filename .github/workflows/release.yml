name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Enforce tag and package version parity
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match package.json version tag '$EXPECTED_TAG'."
            exit 1
          fi
          if [ "$RELEASE_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release version '$RELEASE_VERSION' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify trusted publishing runtime
        run: |
          node --version
          npm --version
          node scripts/ci/assert-publish-runtime.mjs

      - name: Run release consumer smoke
        run: npm run release:dry-run

      - name: Ensure package version is unpublished
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view "web-quality-gatekeeper@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "::error::web-quality-gatekeeper@${RELEASE_VERSION} is already published."
            exit 1
          fi

      - name: Configure npm auth token fallback
        if: env.HAS_NPM_TOKEN == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Configure npm registry for trusted publishing
        if: env.HAS_NPM_TOKEN != 'true'
        run: npm config set registry https://registry.npmjs.org/

      - name: Publish to npm with trusted publishing
        if: env.HAS_NPM_TOKEN != 'true'
        run: npm publish --provenance --access public

      - name: Publish to npm with token fallback
        if: env.HAS_NPM_TOKEN == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi
          # Write multiline output
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Resolve major tag update eligibility
        id: major-tag
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "should_update=true" >> "$GITHUB_OUTPUT"
            echo "major=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_update=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping major tag update for non-stable tag '${GITHUB_REF_NAME}'."

      - name: Update major version tag
        if: steps.major-tag.outputs.should_update == 'true'
        run: |
          MAJOR="${{ steps.major-tag.outputs.major }}"
          git tag -f "$MAJOR" "${{ github.ref_name }}"
          git push origin "$MAJOR" --force
