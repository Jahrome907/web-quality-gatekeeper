name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog_body: ${{ steps.changelog.outputs.body }}
      should_update_major: ${{ steps.major-tag.outputs.should_update }}
      major: ${{ steps.major-tag.outputs.major }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Check Node engine
        run: npm run engines:check

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Enforce tag and package version parity
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match package.json version tag '$EXPECTED_TAG'."
            exit 1
          fi
          if [ "$RELEASE_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release version '$RELEASE_VERSION' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Resolve Chrome path
        run: node scripts/ci/resolve-chrome-path.mjs

      - name: Install Playwright browsers
        if: env.CHROME_PATH == ''
        timeout-minutes: 10
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "120000"
        run: npx playwright install --with-deps --only-shell chromium

      - name: Verify release runtime
        run: |
          node --version
          npm --version

      - name: Run release consumer smoke
        run: npm run release:dry-run

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve major tag update eligibility
        id: major-tag
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "should_update=true" >> "$GITHUB_OUTPUT"
            echo "major=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_update=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping major tag update for non-stable tag '${GITHUB_REF_NAME}'."

  publish:
    runs-on: ubuntu-latest
    needs: validate
    concurrency:
      group: release-major-${{ needs.validate.outputs.major || github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout for tag update
        if: needs.validate.outputs.should_update_major == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate stable major tag movement
        if: needs.validate.outputs.should_update_major == 'true'
        env:
          MAJOR: ${{ needs.validate.outputs.major }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git fetch --force --tags origin
          if git rev-parse -q --verify "refs/tags/$MAJOR" >/dev/null; then
            export CURRENT_VERSION="$(git tag --points-at "$MAJOR" --list "${MAJOR}.*" | grep -E "^${MAJOR}\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$" | sed 's/^v//' | sort -V | tail -n 1 || true)"
          else
            export CURRENT_VERSION=""
          fi
          node <<'NODE'
          const current = process.env.CURRENT_VERSION;
          const candidate = process.env.RELEASE_TAG?.replace(/^v/, "");
          function parseStable(value) {
            const match = value?.match(/^(\d+)\.(\d+)\.(\d+)(?:\+[0-9A-Za-z.-]+)?$/);
            if (!match) {
              throw new Error(`Expected stable SemVer, received '${value ?? ""}'.`);
            }
            return match.slice(1).map(Number);
          }
          if (current) {
            const left = parseStable(candidate);
            const right = parseStable(current);
            for (let index = 0; index < 3; index += 1) {
              if (left[index] > right[index]) {
                process.exit(0);
              }
              if (left[index] < right[index]) {
                throw new Error(`Refusing to move ${process.env.MAJOR} backward from v${current} to ${process.env.RELEASE_TAG}.`);
              }
            }
          }
          NODE

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ needs.validate.outputs.changelog_body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Update major version tag
        if: needs.validate.outputs.should_update_major == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MAJOR: ${{ needs.validate.outputs.major }}
        run: |
          RELEASE_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}^{commit}")"
          git tag -f "$MAJOR" "$RELEASE_COMMIT"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/$MAJOR" --force
