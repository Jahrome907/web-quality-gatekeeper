name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Enforce runtime audit gate (high+critical)
        run: npm run security:audit

      - name: Run full maintainer validation
        run: npm run validate:full

      - name: Run release consumer smoke
        run: npm run release:dry-run

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi
          # Write multiline output
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Resolve major tag update eligibility
        id: major-tag
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "should_update=true" >> "$GITHUB_OUTPUT"
            echo "major=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_update=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping major tag update for non-stable tag '${GITHUB_REF_NAME}'."

      - name: Update major version tag
        if: steps.major-tag.outputs.should_update == 'true'
        run: |
          MAJOR="${{ steps.major-tag.outputs.major }}"
          git tag -f "$MAJOR" "${{ github.ref_name }}"
          git push origin "$MAJOR" --force
