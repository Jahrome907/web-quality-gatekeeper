name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to backfill (for example v3.1.6)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-input:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.tag.outputs.release_version }}
      npm_dist_tag: ${{ steps.tag.outputs.npm_dist_tag }}
    steps:
      - name: Validate requested tag
        id: tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::release_tag must be a semantic version tag (for example v3.1.6 or v3.1.6-beta.1+build.5)."
            exit 1
          fi
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          if [[ "$RELEASE_TAG" == *-* ]]; then
            echo "npm_dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

  validate-package:
    runs-on: ubuntu-latest
    needs: validate-input
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ inputs.release_tag }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify publish runtime
        run: |
          node --version
          npm --version
          node scripts/ci/assert-publish-runtime.mjs
          npm run engines:check

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Resolve Chrome path
        run: node scripts/ci/resolve-chrome-path.mjs

      - name: Install Playwright browsers
        if: env.CHROME_PATH == ''
        timeout-minutes: 10
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "120000"
        run: npx playwright install --with-deps --only-shell chromium

      - name: Verify package
        run: |
          npm run validate:full
          npm run contracts:check

      - name: Smoke test packed tarball
        run: npm run smoke:pack

      - name: Enforce requested tag and package version parity
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match package.json version tag '$EXPECTED_TAG'."
            exit 1
          fi

      - name: Ensure package version is unpublished
        env:
          RELEASE_VERSION: ${{ needs.validate-input.outputs.release_version }}
        run: |
          VIEW_OUTPUT="$(npm view "web-quality-gatekeeper@${RELEASE_VERSION}" version --registry=https://registry.npmjs.org/ 2>&1)" && {
            echo "::error::web-quality-gatekeeper@${RELEASE_VERSION} is already published."
            exit 1
          }
          VIEW_STATUS=$?

          if printf '%s\n' "$VIEW_OUTPUT" | grep -Eq "(E404|404 Not Found|is not in this registry)"; then
            echo "web-quality-gatekeeper@${RELEASE_VERSION} is not published yet."
            exit 0
          fi

          echo "::error::Unable to confirm that web-quality-gatekeeper@${RELEASE_VERSION} is unpublished."
          printf '%s\n' "$VIEW_OUTPUT"
          exit "$VIEW_STATUS"

      - name: Pack publish artifact
        id: pack
        run: |
          npm pack --json > pack.json
          TARBALL="$(node -p "JSON.parse(require('node:fs').readFileSync('pack.json', 'utf8'))[0].filename")"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Upload publish artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: [validate-input, validate-package]
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Configure npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download publish artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: npm-package
          path: npm-package

      - name: Publish to npm with trusted publishing
        env:
          NPM_DIST_TAG: ${{ needs.validate-input.outputs.npm_dist_tag }}
        run: |
          if [ "$NPM_DIST_TAG" != "latest" ] && [ "$NPM_DIST_TAG" != "next" ]; then
            echo "::error::Unexpected npm dist-tag '$NPM_DIST_TAG'."
            exit 1
          fi
          shopt -s nullglob
          tarballs=(./npm-package/*.tgz)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one packed npm tarball, found ${#tarballs[@]}."
            exit 1
          fi
          npm publish "${tarballs[0]}" --provenance --access public --tag "$NPM_DIST_TAG"
