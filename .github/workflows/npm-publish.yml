name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to backfill (for example v3.1.2)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Verify publish runtime
        run: |
          node --version
          npm --version
          node scripts/ci/assert-publish-runtime.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify package
        run: |
          npm run check
          npm run security:audit
          npm run build

      - name: Smoke test packed tarball
        run: npm run smoke:pack

      - name: Enforce requested tag and package version parity
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::release_tag must be a semantic version tag (for example v3.1.2)."
            exit 1
          fi
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match package.json version tag '$EXPECTED_TAG'."
            exit 1
          fi

      - name: Ensure package version is unpublished
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          RELEASE_VERSION="${RELEASE_TAG#v}"
          if npm view "web-quality-gatekeeper@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "::error::web-quality-gatekeeper@${RELEASE_VERSION} is already published."
            exit 1
          fi

      - name: Require maintainer publish token for emergency backfill
        if: env.HAS_NPM_TOKEN != 'true'
        run: |
          echo "::error::NPM Publish is an emergency backfill path and requires the NPM_TOKEN repository secret."
          exit 1

      - name: Configure npm auth token
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm with token fallback
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
