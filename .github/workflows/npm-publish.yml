name: NPM Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify package
        run: |
          npm run check
          npm run security:audit
          npm run build

      - name: Smoke test packed tarball
        run: npm run smoke:pack

      - name: Resolve publish context
        id: publish_context
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "publish_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "is_publishable_tag=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "publish_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "is_publishable_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_tag=" >> "$GITHUB_OUTPUT"
            echo "is_publishable_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce tag and package version parity
        if: steps.publish_context.outputs.is_publishable_tag == 'true'
        env:
          RELEASE_TAG: ${{ steps.publish_context.outputs.publish_tag }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match package.json version tag '$EXPECTED_TAG'."
            exit 1
          fi

      - name: Publish to npm
        if: steps.publish_context.outputs.is_publishable_tag == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
