# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Security: Require explicit approval for first-time contributors
# The workflow runs with read-only permissions on PR code
jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      # Opt in to non-blocking behavior when auditing remote URLs.
      WQG_RELAXED_REMOTE: "false"
      # Mark audits as sensitive when authenticated pages or private content are involved.
      WQG_SENSITIVE_AUDIT: "false"
      # Keep sensitive runs private by default; explicitly opt in to publish outputs.
      WQG_ALLOW_SENSITIVE_OUTPUTS: "false"
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Security: Don't persist credentials to prevent token theft
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Security: Use --ignore-scripts to prevent malicious postinstall scripts
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run checks
        run: npm run check

      - name: Enforce runtime audit gate (high+critical)
        run: npm run security:audit

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

      - name: Resolve audit target
        id: target
        env:
          PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const hasDemo = Boolean(pkg.scripts && pkg.scripts.demo);
          const output = process.env.GITHUB_OUTPUT;
          const override = process.env.WQG_URL;
          const pagesUrl = process.env.PAGES_URL;
          if (override) {
            try {
              const url = new URL(override);
              if (url.protocol !== 'http:' && url.protocol !== 'https:') {
                console.error('WQG_URL must use http or https protocol');
                process.exit(1);
              }
              fs.appendFileSync(output, `mode=remote\nurl=${url.href}\n`);
            } catch (e) {
              console.error('Invalid WQG_URL format:', e.message);
              process.exit(1);
            }
            process.exit(0);
          }
          if (hasDemo) {
            fs.appendFileSync(output, 'mode=demo\nurl=http://localhost:4173\n');
          } else if (pagesUrl) {
            fs.appendFileSync(output, `mode=remote\nurl=${pagesUrl}\n`);
          } else {
            fs.appendFileSync(output, 'mode=remote\nurl=https://example.com\n');
          }
          NODE

      - name: Start demo server
        if: steps.target.outputs.mode == 'demo'
        run: |
          npm run demo -- --port 4173 &
          npx wait-on http://localhost:4173

      - name: Resolve audit policy
        id: policy
        env:
          TARGET_MODE: ${{ steps.target.outputs.mode }}
          WQG_RELAXED_REMOTE: ${{ env.WQG_RELAXED_REMOTE }}
          WQG_SENSITIVE_AUDIT: ${{ env.WQG_SENSITIVE_AUDIT }}
          WQG_ALLOW_SENSITIVE_OUTPUTS: ${{ env.WQG_ALLOW_SENSITIVE_OUTPUTS }}
          SECRET_WQG_AUTH_HEADER: ${{ secrets.WQG_AUTH_HEADER }}
          SECRET_WQG_AUTH_HEADERS: ${{ secrets.WQG_AUTH_HEADERS }}
          SECRET_WQG_AUTH_COOKIE: ${{ secrets.WQG_AUTH_COOKIE }}
          SECRET_WQG_AUTH_COOKIES: ${{ secrets.WQG_AUTH_COOKIES }}
        run: |
          as_bool() {
            case "${1,,}" in
              1|true|yes|on) return 0 ;;
              *) return 1 ;;
            esac
          }

          RELAXED_REMOTE=false
          if [ "$TARGET_MODE" != "demo" ] && as_bool "${WQG_RELAXED_REMOTE:-}"; then
            RELAXED_REMOTE=true
          fi

          HAS_AUTH=false
          if [ -n "${WQG_AUTH_HEADER:-}" ] || [ -n "${WQG_AUTH_HEADERS:-}" ] || [ -n "${WQG_AUTH_COOKIE:-}" ] || [ -n "${WQG_AUTH_COOKIES:-}" ] || [ -n "${SECRET_WQG_AUTH_HEADER:-}" ] || [ -n "${SECRET_WQG_AUTH_HEADERS:-}" ] || [ -n "${SECRET_WQG_AUTH_COOKIE:-}" ] || [ -n "${SECRET_WQG_AUTH_COOKIES:-}" ]; then
            HAS_AUTH=true
          fi

          SENSITIVE_AUDIT=false
          if [ "$HAS_AUTH" = "true" ] || as_bool "${WQG_SENSITIVE_AUDIT:-}"; then
            SENSITIVE_AUDIT=true
          fi

          ALLOW_SENSITIVE_OUTPUTS=false
          if as_bool "${WQG_ALLOW_SENSITIVE_OUTPUTS:-}"; then
            ALLOW_SENSITIVE_OUTPUTS=true
          fi

          PUBLISH_OUTPUTS=true
          if [ "$SENSITIVE_AUDIT" = "true" ] && [ "$ALLOW_SENSITIVE_OUTPUTS" != "true" ]; then
            PUBLISH_OUTPUTS=false
            echo "::notice::Sensitive or authenticated audit detected. Artifact upload and PR comment are disabled by default."
            echo "::notice::Set WQG_ALLOW_SENSITIVE_OUTPUTS=true to publish artifacts/comments for this run."
          fi

          if [ "$RELAXED_REMOTE" = "true" ]; then
            echo "::notice::Remote audit is running in relaxed mode (non-blocking gates enabled)."
          fi

          echo "relaxed_remote=$RELAXED_REMOTE" >> "$GITHUB_OUTPUT"
          echo "sensitive_audit=$SENSITIVE_AUDIT" >> "$GITHUB_OUTPUT"
          echo "publish_outputs=$PUBLISH_OUTPUTS" >> "$GITHUB_OUTPUT"

      - name: Run audit
        env:
          AUDIT_URL: ${{ steps.target.outputs.url }}
          TARGET_MODE: ${{ steps.target.outputs.mode }}
          RELAXED_REMOTE: ${{ steps.policy.outputs.relaxed_remote }}
          SECRET_WQG_AUTH_HEADER: ${{ secrets.WQG_AUTH_HEADER }}
          SECRET_WQG_AUTH_HEADERS: ${{ secrets.WQG_AUTH_HEADERS }}
          SECRET_WQG_AUTH_COOKIE: ${{ secrets.WQG_AUTH_COOKIE }}
          SECRET_WQG_AUTH_COOKIES: ${{ secrets.WQG_AUTH_COOKIES }}
        run: |
          if [ -z "${WQG_AUTH_HEADER:-}" ] && [ -n "${SECRET_WQG_AUTH_HEADER:-}" ]; then
            export WQG_AUTH_HEADER="$SECRET_WQG_AUTH_HEADER"
          fi
          if [ -z "${WQG_AUTH_HEADERS:-}" ] && [ -n "${SECRET_WQG_AUTH_HEADERS:-}" ]; then
            export WQG_AUTH_HEADERS="$SECRET_WQG_AUTH_HEADERS"
          fi
          if [ -z "${WQG_AUTH_COOKIE:-}" ] && [ -n "${SECRET_WQG_AUTH_COOKIE:-}" ]; then
            export WQG_AUTH_COOKIE="$SECRET_WQG_AUTH_COOKIE"
          fi
          if [ -z "${WQG_AUTH_COOKIES:-}" ] && [ -n "${SECRET_WQG_AUTH_COOKIES:-}" ]; then
            export WQG_AUTH_COOKIES="$SECRET_WQG_AUTH_COOKIES"
          fi

          ARGS=()
          if [ "$RELAXED_REMOTE" = "true" ]; then
            ARGS+=(--no-fail-on-a11y --no-fail-on-perf --no-fail-on-visual)
          fi
          if [ "$TARGET_MODE" = "demo" ]; then
            ARGS+=(--allow-internal-targets)
          fi
          npm run audit -- "$AUDIT_URL" \
            --config configs/default.json \
            --out artifacts \
            --baseline-dir baselines \
            "${ARGS[@]}"

      - name: Upload artifacts
        if: always() && steps.policy.outputs.publish_outputs == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wqg-artifacts
          path: artifacts
          if-no-files-found: warn

      - name: Comment PR summary
        if: always() && steps.policy.outputs.publish_outputs == 'true' && github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'artifacts/summary.json';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            let body = '## Web Quality Gatekeeper\n';

            if (fs.existsSync(summaryPath)) {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              const status = summary.overallStatus?.toUpperCase() ?? 'UNKNOWN';
              const perf = summary.performance?.metrics || {};
              const budgets = summary.performance?.budgets || {};
              const a11y = summary.a11y?.countsByImpact || {};
              const visual = summary.visual;

              body += `- Status: **${status}**\n`;
              if (summary.performance) {
                body += `- Performance: score ${perf.performanceScore ?? 'n/a'} (min ${budgets.performance ?? 'n/a'}), `;
                body += `LCP ${perf.lcpMs ?? 'n/a'}ms (max ${budgets.lcpMs ?? 'n/a'}), `;
                body += `CLS ${perf.cls ?? 'n/a'} (max ${budgets.cls ?? 'n/a'}), `;
                body += `TBT ${perf.tbtMs ?? 'n/a'}ms (max ${budgets.tbtMs ?? 'n/a'})\n`;
              } else {
                body += '- Performance: skipped\n';
              }

              if (summary.a11y) {
                body += `- A11y: critical ${a11y.critical ?? 0}, serious ${a11y.serious ?? 0}, moderate ${a11y.moderate ?? 0}, minor ${a11y.minor ?? 0}\n`;
              } else {
                body += '- A11y: skipped\n';
              }

              if (visual) {
                body += `- Visual: max mismatch ${visual.maxMismatchRatio?.toFixed(4) ?? 'n/a'} (threshold ${visual.threshold})\n`;
              } else {
                body += '- Visual: skipped\n';
              }
            } else {
              body += '- Summary: `artifacts/summary.json` not found\n';
            }

            body += `- Artifacts: ${runUrl}\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            let existing = comments.find(c => c.body?.startsWith('## Web Quality Gatekeeper'));
            if (!existing) {
              let page = 2;
              while (comments.length === 100) {
                const { data: more } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  per_page: 100,
                  page
                });
                existing = more.find(c => c.body?.startsWith('## Web Quality Gatekeeper'));
                if (existing || more.length < 100) break;
                page++;
              }
            }
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
