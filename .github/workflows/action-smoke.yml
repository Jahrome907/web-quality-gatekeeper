name: Action Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-composite-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Start local fixture site
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 --directory tests/fixtures/site > /tmp/wqg-fixture.log 2>&1 &
          echo $! > /tmp/wqg-fixture.pid
          for _ in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Fixture server did not start in time"
          exit 1

      - name: Run local action
        id: wqg
        uses: ./
        with:
          url: http://127.0.0.1:4173
          config-path: tests/fixtures/integration-config.json
          policy: tests/fixtures/policies/action-relative-policy.json
          baseline-dir: .tmp-action-smoke-baselines
          allow-internal-targets: "true"
          fail-on-a11y: "false"
          fail-on-perf: "false"
          fail-on-visual: "false"

      - name: Assert action outputs
        env:
          WQG_ACTION_SUMMARY_PATH: ${{ steps.wqg.outputs.summary-path }}
          WQG_ACTION_SUMMARY_V2_PATH: ${{ steps.wqg.outputs.summary-v2-path }}
          WQG_ACTION_REPORT_PATH: ${{ steps.wqg.outputs.report-path }}
          WQG_ACTION_ACTION_PLAN_PATH: ${{ steps.wqg.outputs.action-plan-path }}
          WQG_ACTION_PR_RISK_LEDGER_PATH: ${{ steps.wqg.outputs.pr-risk-ledger-path }}
          WQG_ACTION_PR_RISK_LEDGER_MD_PATH: ${{ steps.wqg.outputs.pr-risk-ledger-md-path }}
        run: |
          STATUS="${{ steps.wqg.outputs.status }}"
          SUMMARY_PATH="${{ steps.wqg.outputs.summary-path }}"
          SUMMARY_V2_PATH="${{ steps.wqg.outputs.summary-v2-path }}"
          REPORT_PATH="${{ steps.wqg.outputs.report-path }}"
          ACTION_PLAN_PATH="${{ steps.wqg.outputs.action-plan-path }}"
          PR_RISK_LEDGER_PATH="${{ steps.wqg.outputs.pr-risk-ledger-path }}"
          PR_RISK_LEDGER_MD_PATH="${{ steps.wqg.outputs.pr-risk-ledger-md-path }}"

          test -n "$STATUS"
          test -n "$SUMMARY_PATH"
          test -n "$SUMMARY_V2_PATH"
          test -n "$REPORT_PATH"
          test -n "$ACTION_PLAN_PATH"
          test -n "$PR_RISK_LEDGER_PATH"
          test -n "$PR_RISK_LEDGER_MD_PATH"
          test "$SUMMARY_PATH" = "artifacts/summary.json"
          test "$SUMMARY_V2_PATH" = "artifacts/summary.v2.json"
          test "$REPORT_PATH" = "artifacts/report.html"
          test "$ACTION_PLAN_PATH" = "artifacts/action-plan.md"
          test "$PR_RISK_LEDGER_PATH" = "artifacts/pr-risk-ledger.json"
          test "$PR_RISK_LEDGER_MD_PATH" = "artifacts/pr-risk-ledger.md"
          case "$STATUS" in
            pass|fail) ;;
            *) echo "Unexpected status: $STATUS"; exit 1 ;;
          esac
          node scripts/ci/assert-action-smoke.mjs

      - name: Stop fixture site
        if: always()
        run: |
          if [ -f /tmp/wqg-fixture.pid ]; then
            kill "$(cat /tmp/wqg-fixture.pid)" || true
          fi
