name: Bug report
description: Report a problem with Web Quality Gatekeeper
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    attributes:
      label: Version
      description: Output of `wqg --version` or commit SHA
  - type: dropdown
    attributes:
      label: Surface
      description: Where did you hit the issue?
      options:
        - CLI
        - GitHub Action
        - Workflow / CI
        - Docs / Examples
        - Packaged install
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Provide clear steps to reproduce the issue
      placeholder: |
        1. Run ...
        2. Visit ...
        3. See error
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
  - type: textarea
    attributes:
      label: Actual behavior
  - type: textarea
    attributes:
      label: Logs or artifacts
      description: Include summary.json or relevant logs if possible
  - type: textarea
    attributes:
      label: Config or policy snippet
      description: Share the smallest relevant config, policy, or workflow snippet if the issue depends on custom inputs
