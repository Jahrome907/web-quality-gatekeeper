# Example: Using Web Quality Gatekeeper in your own repo.
# Copy this file to .github/workflows/quality-gate.yml in your project.

name: Quality Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Set to true for authenticated/private audits.
  WQG_SENSITIVE_AUDIT: "false"
  # Keep false for public repos unless publishing sensitive outputs is intentional.
  WQG_ALLOW_SENSITIVE_OUTPUTS: "false"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run quality gate (strict by default)
        uses: Jahrome907/web-quality-gatekeeper@v3
        with:
          url: https://your-site.example.com
          # Optional authenticated audits (recommended to source from secrets)
          # headers: |
          #   Authorization: Bearer ${{ secrets.STAGING_API_TOKEN }}
          # cookies: |
          #   session_id=${{ secrets.STAGING_SESSION_ID }}
          # Optional: customize thresholds via config
          # config-path: .quality-gate.json
          # Optional relaxed / non-blocking mode:
          # fail-on-a11y: "false"
          # fail-on-perf: "false"
          # fail-on-visual: "false"
          # Optional internal/private target override (CI/authenticated runs block by default):
          # allow-internal-targets: "true"

      - name: Upload artifacts
        if: always() && (env.WQG_SENSITIVE_AUDIT != 'true' || env.WQG_ALLOW_SENSITIVE_OUTPUTS == 'true')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wqg-artifacts
          path: artifacts
          if-no-files-found: warn
