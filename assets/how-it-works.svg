<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 850" fill="none">
  <defs>
    <linearGradient id="bg" x1="140" y1="64" x2="1140" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7faf7"/>
      <stop offset="1" stop-color="#edf4ef"/>
    </linearGradient>
    <linearGradient id="accent" x1="240" y1="0" x2="1040" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f6a44" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#215ea6" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#183423" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M2 2L10 6L2 10V2Z" fill="#406653"/>
    </marker>
  </defs>

  <rect width="1280" height="850" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="850" rx="28" fill="url(#accent)"/>

  <g font-family="'IBM Plex Sans','Avenir Next','Segoe UI',sans-serif" fill="#12261a">
    <text x="92" y="104" font-size="16" font-weight="700" letter-spacing="0.16em" fill="#406653">WEB QUALITY GATEKEEPER</text>
    <text x="92" y="154" font-size="46" font-weight="700">Ship one target through four evidence streams.</text>
    <text x="92" y="192" font-size="22" fill="#405548">
      Playwright, axe, Lighthouse, and visual diff stay aligned to the same audited URL,
    </text>
    <text x="92" y="222" font-size="22" fill="#405548">
      then emit HTML, JSON, baselines, and CI-safe release signals.
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="76" y="274" width="270" height="440" rx="28" fill="#fbfdfb" stroke="#d8e5dc"/>
    <rect x="390" y="274" width="500" height="440" rx="28" fill="#fbfdfb" stroke="#d8e5dc"/>
    <rect x="934" y="274" width="270" height="440" rx="28" fill="#fbfdfb" stroke="#d8e5dc"/>
  </g>

  <g font-family="'IBM Plex Sans','Avenir Next','Segoe UI',sans-serif">
    <text x="110" y="320" font-size="15" font-weight="700" letter-spacing="0.14em" fill="#406653">INPUTS</text>
    <text x="424" y="320" font-size="15" font-weight="700" letter-spacing="0.14em" fill="#406653">AUDIT ENGINE</text>
    <text x="968" y="320" font-size="15" font-weight="700" letter-spacing="0.14em" fill="#406653">OUTPUTS</text>

    <!-- LEFT COLUMN -->
    <rect x="100" y="340" width="222" height="114" rx="18" fill="#eef6f0" stroke="#d6e5da"/>
    <text x="122" y="376" font-size="22" font-weight="700" fill="#12261a">Target + Config</text>
    <text x="122" y="404" font-size="15" fill="#496052">URL, policy, budgets, auth,</text>
    <text x="122" y="426" font-size="15" fill="#496052">baselines, output paths.</text>

    <rect x="100" y="474" width="222" height="128" rx="18" fill="#eef6f0" stroke="#d6e5da"/>
    <text x="122" y="510" font-size="22" font-weight="700" fill="#12261a">Safety Rails</text>
    <text x="122" y="538" font-size="14" fill="#496052">SSRF-sensitive target checks,</text>
    <text x="122" y="558" font-size="14" fill="#496052">redirect scrutiny,</text>
    <text x="122" y="578" font-size="14" fill="#496052">host pinning.</text>

    <rect x="100" y="622" width="222" height="60" rx="18" fill="#eef6f0" stroke="#d6e5da"/>
    <text x="211" y="648" text-anchor="middle" font-size="15" font-weight="700" fill="#12261a">
      <tspan x="211" dy="0">One requested audit,</tspan>
      <tspan x="211" dy="20">one resolved target</tspan>
    </text>

    <!-- CENTER COLUMN -->
    <rect x="414" y="340" width="452" height="92" rx="18" fill="#f4f8f5" stroke="#d6e5da"/>
    <text x="640" y="378" text-anchor="middle" font-size="24" font-weight="700" fill="#12261a">
      <tspan x="640" dy="0">Playwright session</tspan>
      <tspan x="640" dy="28">opens the page once</tspan>
    </text>

    <rect x="414" y="452" width="216" height="120" rx="18" fill="#eef4ff" stroke="#d7e0ef"/>
    <text x="438" y="484" font-size="16" font-weight="700" fill="#17355c">Playwright + Runtime</text>
    <text x="438" y="512" font-size="14" fill="#4c6485">Navigation, console,</text>
    <text x="438" y="532" font-size="14" fill="#4c6485">network, screenshots,</text>
    <text x="438" y="552" font-size="14" fill="#4c6485">stability waits.</text>

    <rect x="650" y="452" width="216" height="120" rx="18" fill="#fff4ed" stroke="#ecd9c9"/>
    <text x="674" y="484" font-size="16" font-weight="700" fill="#5b3716">axe + Lighthouse</text>
    <text x="674" y="512" font-size="14" fill="#7d5b39">Accessibility,</text>
    <text x="674" y="532" font-size="14" fill="#7d5b39">performance budgets,</text>
    <text x="674" y="552" font-size="14" fill="#7d5b39">opportunities, vitals.</text>

    <rect x="414" y="592" width="452" height="90" rx="18" fill="#eef6f0" stroke="#d6e5da"/>
    <text x="640" y="632" text-anchor="middle" font-size="17" font-weight="700" fill="#12261a">
      <tspan x="640" dy="0">Visual diff compares against pinned baselines</tspan>
      <tspan x="640" dy="24">and masks ignore regions.</tspan>
    </text>

    <!-- RIGHT COLUMN -->
    <rect x="958" y="340" width="222" height="114" rx="18" fill="#f7f5ef" stroke="#e5dfd0"/>
    <text x="980" y="376" font-size="19" font-weight="700" fill="#232015">Report + Summaries</text>
    <text x="980" y="404" font-size="15" fill="#5e5849">HTML report, summary.json,</text>
    <text x="980" y="426" font-size="15" fill="#5e5849">summary.v2.json.</text>

    <rect x="958" y="474" width="222" height="128" rx="18" fill="#f7f5ef" stroke="#e5dfd0"/>
    <text x="980" y="510" font-size="21" font-weight="700" fill="#232015">Evidence Files</text>
    <text x="980" y="538" font-size="15" fill="#5e5849">Screenshots, diffs, lighthouse,</text>
    <text x="980" y="558" font-size="15" fill="#5e5849">axe findings, action plans,</text>
    <text x="980" y="578" font-size="15" fill="#5e5849">trend snapshots.</text>

    <rect x="958" y="622" width="222" height="60" rx="18" fill="#f7f5ef" stroke="#e5dfd0"/>
    <text x="1069" y="658" text-anchor="middle" font-size="13" font-weight="700" fill="#232015">
      CLI, CI, PR comments, release gates
    </text>
  </g>

  <g stroke="#406653" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M346 512H390"/>
    <path d="M890 512H934"/>
  </g>

  <g font-family="'IBM Plex Sans','Avenir Next','Segoe UI',sans-serif">
    <rect x="76" y="742" width="1128" height="56" rx="16" fill="#102d1e"/>
    <text x="640" y="766" text-anchor="middle" font-size="18" font-weight="700" fill="#f3f8f4">
      <tspan x="640" dy="0">Same target. Same evidence trail.</tspan>
      <tspan x="640" dy="20">One release decision.</tspan>
    </text>
  </g>
</svg>
